<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>场景实验室｜植物基互动H5</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand">场景实验室</div><nav class="nav">
    <a class="chip" data-page="index.html" href="./index.html">首页</a>
    <a class="chip" data-page="insight.html" href="./insight.html">趋势洞察</a>
    <a class="chip" data-page="products.html" href="./products.html">产品档案</a>
    <a class="chip" data-page="lab.html" href="./lab.html">场景实验室</a>
    <a class="chip" data-page="faq.html" href="./faq.html">FAQ</a>
  </nav></div></header>
  <main class="container">
    <section class="panel reveal">
      <h1 class="title">一日菜单生成器</h1>
      <p class="desc">按口味、预算和场景生成植物基建议组合。</p>
      <div class="controls">
        <label>口味偏好
          <select id="taste">
            <option>清爽</option><option>浓郁</option><option>均衡</option>
          </select>
        </label>
        <label>预算水平
          <select id="budget">
            <option>入门</option><option>标准</option><option>进阶</option>
          </select>
        </label>
        <label>核心场景
          <select id="scene">
            <option>早餐</option><option>通勤</option><option>健身</option><option>社交</option>
          </select>
        </label>
        <button class="btn" type="button" id="gen">生成建议</button>
      </div>
      <div class="panel result" id="result">点击按钮生成你的场景组合。</div>
    </section>
  </main>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
  <script>
    H5Common.initCommon();
    var menuMap = {
      早餐: ["燕麦奶咖啡", "全麦吐司+鹰嘴豆泥", "坚果水果杯"],
      通勤: ["常温豆奶", "植物蛋白能量棒", "混合坚果包"],
      健身: ["植物蛋白奶昔", "藜麦豆腐沙拉", "香蕉燕麦碗"],
      社交: ["植物基汉堡", "烤蔬菜拼盘", "低糖燕麦甜品"]
    };
    H5Common.qs("#gen").addEventListener("click", function () {
      var taste = H5Common.qs("#taste").value;
      var budget = H5Common.qs("#budget").value;
      var scene = H5Common.qs("#scene").value;
      var base = menuMap[scene] || menuMap["早餐"];
      var text = "推荐场景：" + scene + "\n口味倾向：" + taste + "｜预算：" + budget + "\n早餐/主餐/加餐建议：\n1. " + base[0] + "\n2. " + base[1] + "\n3. " + base[2] + "\n\n提示：先从一餐替换开始，逐步观察口味和复购习惯。";
      H5Common.qs("#result").textContent = text;
    });
  </script>
</body>
</html>
