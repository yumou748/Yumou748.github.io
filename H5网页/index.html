<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2f1e" />
  <title>植物基食品互动H5｜首页</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">植物基互动H5</div>
      <nav class="nav">
        <a class="chip" data-page="index.html" href="./index.html">首页</a>
        <a class="chip" data-page="insight.html" href="./insight.html">趋势洞察</a>
        <a class="chip" data-page="products.html" href="./products.html">产品档案</a>
        <a class="chip" data-page="lab.html" href="./lab.html">场景实验室</a>
        <a class="chip" data-page="faq.html" href="./faq.html">FAQ</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero reveal">
      <div>
        <h1>植物基食品互动体验广告</h1>
        <p>基于大食物观与新消费视角，从供给结构、消费场景与产品认知三个层面，呈现植物基与日常饮食的结合方式。</p>
        <div class="row" style="margin-top:.9rem">
          <a class="btn" href="./insight.html">开始体验</a>
          <button class="btn ghost" data-action="share" type="button">分享页面</button>
        </div>
      </div>
      <div class="hero-media">
        <img
          data-role="hero"
          class="hero-img"
          src=""
          alt="植物基餐食封面图"
          decoding="async"
        />
      </div>
    </section>

    <section class="section reveal">
      <h2 class="title">核心数据速览</h2>
      <p class="desc">用几组数字快速把握植物基消费的品类、驱动力与典型场景。</p>
      <div class="stats" id="stats"></div>
    </section>

    <section class="section reveal">
      <h2 class="title">大食物观与新消费要点</h2>
      <div class="grid cards">
        <article class="card">
          <div class="card-media"><img class="card-img" src="https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=800&q=80&auto=format&fit=crop" alt="农田作物" loading="lazy" decoding="async" /></div>
          <h3>多元供给</h3>
          <p>由单一粮食视角走向耕地、森林、草原、海洋协同，植物基是其中一条补充路径。</p>
        </article>
        <article class="card">
          <div class="card-media"><img class="card-img" src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=800&q=80&auto=format&fit=crop" alt="健康轻食" loading="lazy" decoding="async" /></div>
          <h3>健康理性消费</h3>
          <p>新消费从“尝鲜”走向“复购”，更在意配料、营养密度与实际口感体验。</p>
        </article>
        <article class="card">
          <div class="card-media"><img class="card-img" src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32?w=800&q=80&auto=format&fit=crop" alt="豆类原料" loading="lazy" decoding="async" /></div>
          <h3>场景驱动创新</h3>
          <p>早餐、健身、办公室轻食、社交餐叙等场景，推动植物基产品表达和包装升级。</p>
        </article>
      </div>
    </section>
  </main>

  <div id="toast" class="panel hide" style="position:fixed;left:50%;transform:translateX(-50%);bottom:14px;padding:.55rem .8rem;z-index:30"></div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
  <script>
    H5Common.initCommon();
    var box = H5Common.qs("#stats");
    H5Data.stats.forEach(function (s) {
      var d = document.createElement("div");
      d.className = "stat";
      d.innerHTML = '<div class="num">' + s.num + '</div><div>' + s.label + '</div><small style="color:var(--muted)">' + s.note + "</small>";
      box.appendChild(d);
    });
  </script>
</body>
</html>
