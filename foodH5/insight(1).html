<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>趋势洞察｜植物基互动H5</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand">趋势洞察</div><nav class="nav">
    <a class="chip" data-page="index.html" href="./index.html">首页</a>
    <a class="chip" data-page="insight.html" href="./insight.html">趋势洞察</a>
    <a class="chip" data-page="products.html" href="./products.html">产品档案</a>
    <a class="chip" data-page="lab.html" href="./lab.html">场景实验室</a>
    <a class="chip" data-page="faq.html" href="./faq.html">FAQ</a>
  </nav></div></header>
  <main class="container">
    <section class="panel reveal">
      <h1 class="title">大食物观延展</h1>
      <p class="desc">从单一粮食供给走向多元食物体系，植物基提供稳定且可拓展的原料路径。</p>
      <div class="grid cards" id="insight-cards"></div>
    </section>
    <section class="section reveal">
      <h2 class="title">趋势时间线</h2>
      <p class="desc">点击年份查看阶段重点。</p>
      <div class="timeline" id="timeline"></div>
      <div class="panel result" id="time-detail">请选择年份节点。</div>
    </section>
  </main>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
  <script>
    H5Common.initCommon();
    var cards = H5Common.qs("#insight-cards");
    H5Data.images.insight.forEach(function (img, i) {
      var t = ["供给结构升级", "消费观念理性化", "品牌表达场景化"][i];
      var p = ["多源协同强调韧性。", "配料透明与营养可解释性更重要。", "从单品卖点到生活方式叙事。"][i];
      var c = document.createElement("article");
      c.className = "card";
      c.innerHTML = '<h3>' + t + '</h3><p>' + p + "</p>";
      cards.appendChild(c);
    });
    var line = H5Common.qs("#timeline");
    var detail = H5Common.qs("#time-detail");
    H5Data.timeline.forEach(function (it, idx) {
      var b = document.createElement("button");
      b.type = "button";
      b.className = "time-item" + (idx === 0 ? " active" : "");
      b.textContent = it.year + " · " + it.text.slice(0, 15) + "...";
      b.addEventListener("click", function () {
        H5Common.qsa(".time-item", line).forEach(function (x) { x.classList.remove("active"); });
        b.classList.add("active");
        detail.textContent = it.year + "： " + it.text;
      });
      line.appendChild(b);
    });
    detail.textContent = H5Data.timeline[0].year + "： " + H5Data.timeline[0].text;
  </script>
</body>
</html>
